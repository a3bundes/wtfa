<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАТАФА!?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }
        
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .status {
            position: fixed;
            bottom: 2rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Chat styles */
        .chat-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .chat-btn:hover {
            transform: scale(1.1);
        }
        
        .chat-window {
            position: fixed;
            bottom: 5rem;
            right: 2rem;
            width: 380px;
            height: 500px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .chat-window.active {
            display: flex;
        }
        
        .chat-header {
            padding: 1rem;
            background: linear-gradient(135deg, #16213e, #0f3460);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chat-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .chat-status {
            font-size: 0.75rem;
            color: #00ff88;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d9ff, #00a8cc);
            color: #000;
        }
        
        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message.thinking {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
        
        .chat-input {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 0.5rem;
        }
        
        .chat-input input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.9rem;
        }
        
        .chat-input input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .chat-input button {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 480px) {
            .chat-window {
                width: calc(100vw - 2rem);
                right: 1rem;
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ВАТАФА!?</h1>
        <p>Скоро здесь будет что-то интересное</p>
        <div class="links">
            <a href="https://t.me/mws_team" class="link">Telegram</a>
            <a href="https://github.com/openclaw" class="link">GitHub</a>
        </div>
    </div>
    <div class="status">ВАТАФА!? © 2026</div>
    
    <!-- Chat button -->
    <button class="chat-btn" onclick="toggleChat()">💬</button>
    
    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h3>🤖 Чат с Ботом</h3>
            <button onclick="toggleChat()" style="margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:1.25rem;">✕</button>
            <span class="chat-status" id="chatStatus">Online</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Привет! Я AI ассистент. Задай мне вопрос!</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Напиши сообщение..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        let chatOpen = false;
        
        function toggleChat() {
            chatOpen = !chatOpen;
            document.getElementById('chatWindow').classList.toggle('active', chatOpen);
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const messages = document.getElementById('chatMessages');
            const status = document.getElementById('chatStatus');
            
            const userMessage = input.value.trim();
            if (!userMessage) return;
            
            // Add user message
            messages.innerHTML += `<div class="message user">${escapeHtml(userMessage)}</div>`;
            input.value = '';
            
            // Show thinking
            status.textContent = 'Думает...';
            sendBtn.disabled = true;
            messages.scrollTop = messages.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: userMessage })
                });
                
                if (!response.ok) throw new Error('Ошибка сети');
                
                const data = await response.json();
                const botResponse = data.response || 'Извините, произошла ошибка.';
                
                messages.innerHTML += `<div class="message bot">${escapeHtml(botResponse)}</div>`;
                status.textContent = 'Online';
            } catch (error) {
                messages.innerHTML += `<div class="message bot">Извините, произошла ошибка: ${error.message}</div>`;
                status.textContent = 'Ошибка';
            }
            
            sendBtn.disabled = false;
            messages.scrollTop = messages.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
